    <<: *domain
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/deepseek.mrs"
  # [v4 新增] AI 兜底：覆盖所有非中国 AI 服务（Perplexity/Cohere/Mistral 等）
