      - "🇸🇬 新加坡"
      - "🇭🇰 香港"

  - name: "👤 Facebook 32.x"
    type: select
    proxies:
      - "🇺🇸 美国"
      - "🇯🇵 日本"
      - "🇸🇬 新加坡"
      - "🇭🇰 香港"

  - name: "🎮 Discord 32.x"
    type: select
    proxies:
      - "🇺🇸 美国"
      - "🇯🇵 日本"
      - "🇸🇬 新加坡"
      - "🇭🇰 香港"

  # ─────────────────────────────────
  # 开发 & 生产力
  # ─────────────────────────────────

  - name: "🍀 Google 32.x"
    type: select
    proxies:
      - "🇭🇰 香港"
      - "🇯🇵 日本"
      - "🇸🇬 新加坡"
      - "🇺🇸 美国"
      - "🇹🇼 台湾"

  - name: "👨‍💻 GitHub 32.x"
    type: select
    proxies:
      - "🇭🇰 香港"
      - "🇺🇸 美国"
      - "🇯🇵 日本"
      - "🇸🇬 新加坡"

  - name: "☁️ Cloudflare 32.x"
    type: select
    proxies:
      - "🇭🇰 香港"
      - "🇯🇵 日本"
      - "🇺🇸 美国"
      - "🇸🇬 新加坡"

  - name: "🖌️ Figma 32.x"
    type: select
    proxies:
      - "🇺🇸 美国"
      - "🇯🇵 日本"
      - "🇸🇬 新加坡"
      - "🇭🇰 香港"

  - name: "📝 Notion 32.x"
    type: select
    proxies:
      - "🇺🇸 美国"
      - "🇯🇵 日本"
      - "🇸🇬 新加坡"
      - "🇭🇰 香港"

  # ─────────────────────────────────
  # 系统 & 办公
  # ─────────────────────────────────

  - name: "🪟 Microsoft 32.x"
    type: select
    proxies:
      - DIRECT
      - "🇭🇰 香港"
      - "🇯🇵 日本"
      - "🇺🇸 美国"

  - name: "🍎 Apple 32.x"
    type: select
    proxies:
      - DIRECT
      - "🇭🇰 香港"
      - "🇺🇸 美国"

  # ─────────────────────────────────
  # 金融 & 支付
  # ─────────────────────────────────

  - name: "🪙 加密货币 32.x"
    type: select
    proxies:
      - "🇺🇸 美国"
      - "🇸🇬 新加坡"
      - "🇯🇵 日本"
      - "🇬🇧 英国"
      - "🇩🇪 德国"

  - name: "💰 PayPal 32.x"
    type: select
    proxies:
      - "🇺🇸 美国"
      - "🇸🇬 新加坡"
      - "🇬🇧 英国"
      - "🇯🇵 日本"

  # ─────────────────────────────────
  # 游戏
  # ─────────────────────────────────

  - name: "🎮 Steam 32.x"
    type: select
    proxies:
      - DIRECT
      - "🇭🇰 香港"
      - "🇯🇵 日本"
      - "🇸🇬 新加坡"
      - "🇺🇸 美国"

  # ══════════════════════════════════════════════════════════════
  # 【第3区】地区组（省流版 + 稳定版，共18个）
  #
  #  省流版（无★）= C→B→A 故障转移，适合视频/社交/日常
  #  稳定版（带★）= A→B→C 故障转移，适合默认出口/全局代理/AI
  # ══════════════════════════════════════════════════════════════

  # ── 香港 ────────────────────────────────────────────────────
  - name: "🇭🇰 香港"
    <<: *region_eco
    proxies: ["[C] 香港", "[B] 香港", "[A] 香港"]

  - name: "🇭🇰 香港★"
    <<: *region_pro
    proxies: ["[A] 香港", "[B] 香港", "[C] 香港"]

  # ── 日本 ────────────────────────────────────────────────────
  - name: "🇯🇵 日本"
    <<: *region_eco
    proxies: ["[C] 日本", "[B] 日本", "[A] 日本"]

  - name: "🇯🇵 日本★"
    <<: *region_pro
    proxies: ["[A] 日本", "[B] 日本", "[C] 日本"]

  # ── 新加坡 ──────────────────────────────────────────────────
  - name: "🇸🇬 新加坡"
    <<: *region_eco
    proxies: ["[C] 新加坡", "[B] 新加坡", "[A] 新加坡"]

  - name: "🇸🇬 新加坡★"
    <<: *region_pro
    proxies: ["[A] 新加坡", "[B] 新加坡", "[C] 新加坡"]

  # ── 美国 ────────────────────────────────────────────────────
  - name: "🇺🇸 美国"
    <<: *region_eco
    proxies: ["[C] 美国", "[B] 美国", "[A] 美国"]

  - name: "🇺🇸 美国★"
    <<: *region_pro
    proxies: ["[A] 美国", "[B] 美国", "[C] 美国"]

  # ── 台湾 ────────────────────────────────────────────────────
  - name: "🇹🇼 台湾"
    <<: *region_eco
    proxies: ["[C] 台湾", "[B] 台湾", "[A] 台湾"]

  - name: "🇹🇼 台湾★"
    <<: *region_pro
    proxies: ["[A] 台湾", "[B] 台湾", "[C] 台湾"]

  # ── 英国（节点较少，全机场 url-test）────────────────────────
  - name: "🇬🇧 英国"
    <<: *all_ut
    filter: "(?=.*(英|UK|(?i)United Kingdom|Britain|London))^((?!(港|台|日|新|美|德|法)).)*$"

  # ── 德国 ────────────────────────────────────────────────────
  - name: "🇩🇪 德国"
    <<: *all_ut
    filter: "(?=.*(德|DE|(?i)Germany|Berlin|Frankfurt))^((?!(港|台|日|新|美|英|法)).)*$"

  # ── 法国 ────────────────────────────────────────────────────
  - name: "🇫🇷 法国"
    <<: *all_ut
    filter: "(?=.*(法|FR|(?i)France|Paris))^((?!(港|台|日|新|美|英|德)).)*$"

  # ── 韩国 ────────────────────────────────────────────────────
  - name: "🇰🇷 韩国"
    <<: *all_ut
    filter: "(?=.*(韩|韓|KR|(?i)Korea|Seoul))^((?!(港|台|日|新|美)).)*$"

  # ── 全部节点（手动选，应急用）───────────────────────────────
  - name: "🌐 全部节点"
    type: select
    include-all-providers: true

  # ── 故障转移（全节点兜底）───────────────────────────────────
  - name: "🔯 故障转移"
    type: fallback
    include-all-providers: true
    url: https://www.gstatic.com/generate_204
    interval: 300
    timeout: 5000
    filter: "^((?!(直连|剩余|到期|官网|流量|套餐)).)*$"

  # ══════════════════════════════════════════════════════════════
  # 【第4区】机场子组（基础设施，沉底）
  # ══════════════════════════════════════════════════════════════

  # ── 香港子组 ─────────────────────────────────────────────────
  - name: "[C] 香港"
    <<: *sub_ut_c
    filter: "(?=.*(港|HK|(?i)Hong))^((?!(台|日|韩|新|深|美|英|法|德|澳|韓)).)*$"

  - name: "[B] 香港"
    <<: *sub_ut_b
    filter: "(?=.*(港|HK|(?i)Hong))^((?!(台|日|韩|新|深|美|英|法|德|澳|韓)).)*$"

  - name: "[A] 香港"
    <<: *sub_ut_a
    filter: "(?=.*(港|HK|(?i)Hong))^((?!(台|日|韩|新|深|美|英|法|德|澳|韓)).)*$"

  # ── 日本子组 ─────────────────────────────────────────────────
  - name: "[C] 日本"
    <<: *sub_ut_c
    filter: "(?=.*(日|JP|(?i)Japan))^((?!(港|台|韩|新|美|英|韓)).)*$"

  - name: "[B] 日本"
    <<: *sub_ut_b
    filter: "(?=.*(日|JP|(?i)Japan))^((?!(港|台|韩|新|美|英|韓)).)*$"

  - name: "[A] 日本"
    <<: *sub_ut_a
    filter: "(?=.*(日|JP|(?i)Japan))^((?!(港|台|韩|新|美|英|韓)).)*$"

  # ── 新加坡子组 ───────────────────────────────────────────────
  - name: "[C] 新加坡"
    <<: *sub_ut_c
    filter: "(?=.*(新加坡|坡|SG|(?i)Singapore))^((?!(港|台|日|韩|美|韓)).)*$"

  - name: "[B] 新加坡"
    <<: *sub_ut_b
    filter: "(?=.*(新加坡|坡|SG|(?i)Singapore))^((?!(港|台|日|韩|美|韓)).)*$"

  - name: "[A] 新加坡"
    <<: *sub_ut_a
    filter: "(?=.*(新加坡|坡|SG|(?i)Singapore))^((?!(港|台|日|韩|美|韓)).)*$"

  # ── 美国子组 ─────────────────────────────────────────────────
  - name: "[C] 美国"
    <<: *sub_ut_c
    filter: "(?=.*(美|US|(?i)States|America))^((?!(港|台|日|韩|新|韓)).)*$"

  - name: "[B] 美国"
    <<: *sub_ut_b
    filter: "(?=.*(美|US|(?i)States|America))^((?!(港|台|日|韩|新|韓)).)*$"

  - name: "[A] 美国"
    <<: *sub_ut_a
    filter: "(?=.*(美|US|(?i)States|America))^((?!(港|台|日|韩|新|韓)).)*$"

  # ── 台湾子组 ─────────────────────────────────────────────────
  - name: "[C] 台湾"
    <<: *sub_ut_c
    filter: "(?=.*(台|TW|(?i)Taiwan|Taipei))^((?!(港|日|韩|新|美|韓)).)*$"

  - name: "[B] 台湾"
    <<: *sub_ut_b
    filter: "(?=.*(台|TW|(?i)Taiwan|Taipei))^((?!(港|日|韩|新|美|韓)).)*$"

  - name: "[A] 台湾"
    <<: *sub_ut_a
    filter: "(?=.*(台|TW|(?i)Taiwan|Taipei))^((?!(港|日|韩|新|美|韓)).)*$"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 十、路由规则
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
rules:
  # VLAN 网段路由（最高优先级）
  - SRC-IP-CIDR,192.168.31.0/24,DIRECT,no-resolve
  - SRC-IP-CIDR,192.168.33.0/24,🌐 全局代理 33.x,no-resolve
  - SRC-IP-CIDR,192.168.34.0/24,🏠 住宅IP 34.x,no-resolve
  # 192.168.32.x 继续向下走规则分流

  # 私有地址直连
  - RULE-SET,private_ip,DIRECT,no-resolve
  - RULE-SET,private_domain,DIRECT
  # 个人直连（configs/rulesets/DIRECT-32.yaml）
  - RULE-SET,direct_32,DIRECT

  # ── AI 平台 ──────────────────────────────────────────────────
  - RULE-SET,claude_domain,🤖 Claude 32.x
  - RULE-SET,openai_domain,🤖 ChatGPT 32.x
  - RULE-SET,gemini_domain,🔮 Gemini 32.x
  - RULE-SET,deepseek_domain,🐋 DeepSeek 32.x
  # [v4 新增] AI 兜底：所有未单独列出的非中国 AI 服务 → 走默认出口
  - RULE-SET,ai_catchall,🚀 默认出口 32.x

  # ── 视频流媒体 ────────────────────────────────────────────────
  - RULE-SET,youtube_domain,📹 YouTube 32.x
  - RULE-SET,netflix_domain,🎥 Netflix 32.x
  - RULE-SET,netflix_ip,🎥 Netflix 32.x,no-resolve
  - RULE-SET,tiktok_domain,🎵 TikTok 32.x
  - RULE-SET,spotify_domain,🎧 Spotify 32.x
  - RULE-SET,disney_domain,🏰 Disney+ 32.x

  # ── 社交通讯 ─────────────────────────────────────────────────
  - RULE-SET,telegram_domain,📲 Telegram 32.x
  - RULE-SET,telegram_ip,📲 Telegram 32.x,no-resolve
  - RULE-SET,twitter_domain,🐦 X 32.x
  - RULE-SET,twitter_ip,🐦 X 32.x,no-resolve
  - RULE-SET,instagram_domain,📸 Instagram 32.x
  - RULE-SET,facebook_domain,👤 Facebook 32.x
  - RULE-SET,facebook_ip,👤 Facebook 32.x,no-resolve
  - RULE-SET,discord_domain,🎮 Discord 32.x

  # ── 开发 & 生产力 ─────────────────────────────────────────────
  - RULE-SET,google_domain,🍀 Google 32.x
  - RULE-SET,google_ip,🍀 Google 32.x,no-resolve
  - RULE-SET,github_domain,👨‍💻 GitHub 32.x
  - RULE-SET,cloudflare_domain,☁️ Cloudflare 32.x
  - RULE-SET,cloudflare_ip,☁️ Cloudflare 32.x,no-resolve
  - RULE-SET,figma_domain,🖌️ Figma 32.x
  - RULE-SET,notion_domain,📝 Notion 32.x

  # ── 系统 & 办公 ──────────────────────────────────────────────
  - RULE-SET,onedrive_domain,🪟 Microsoft 32.x
  - RULE-SET,microsoft_domain,🪟 Microsoft 32.x
  - RULE-SET,apple_domain,🍎 Apple 32.x
  - RULE-SET,apple_ip,🍎 Apple 32.x,no-resolve

  # ── 金融 & 游戏 ──────────────────────────────────────────────
  - RULE-SET,crypto_domain,🪙 加密货币 32.x
  - RULE-SET,paypal_domain,💰 PayPal 32.x
  - RULE-SET,steam_domain,🎮 Steam 32.x

  # ── GFW & 中国大陆兜底 ───────────────────────────────────────
  - RULE-SET,geolocation_not_cn,🚀 默认出口 32.x
  - RULE-SET,cn_domain,DIRECT
  - RULE-SET,cn_ip,DIRECT,no-resolve

  # 最终兜底
  - MATCH,🐟 漏网之鱼

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 十一、规则集（rule-providers）
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
rule-anchor:
  ip: &ip
    type: http
    interval: 86400
    behavior: ipcidr
    format: mrs
  domain: &domain
    type: http
    interval: 86400
    behavior: domain
    format: mrs
  classical: &classical
    type: http
    interval: 86400
    behavior: classical
    format: text

rule-providers:
  fakeipfilter:
    <<: *domain
    url: "https://raw.githubusercontent.com/wwqgtxx/clash-rules/release/fakeip-filter.mrs"

  private_domain:
    <<: *domain
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/private.mrs"
  private_ip:
    <<: *ip
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/private.mrs"

  # ── 个人直连 DIRECT-32：推送 configs/rulesets/DIRECT-32.yaml 后 raw URL 需一致 ━
  direct_32:
    <<: *classical
    url: "https://raw.githubusercontent.com/hellohongyun/network/refs/heads/main/configs/rulesets/DIRECT-32.yaml"
    format: yaml

  # ── AI ───────────────────────────────────────────────────────
  claude_domain:
    <<: *classical
    url: "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Claude/Claude.yaml"
    format: yaml
  openai_domain:
    <<: *domain
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/openai.mrs"
  gemini_domain:
