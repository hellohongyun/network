# ╔══════════════════════════════════════════════════════════════════════╗
# ║         Mihomo 多网段精细分流配置 · OpenWrt 定制版  v4              ║
# ╠══════════════════════════════════════════════════════════════════════╣
# ║  网段架构：                                                          ║
# ║  192.168.31.x  ap-direct / br-lan  → 直链                           ║
# ║  192.168.32.x  ap-rule             → 规则分流（精细分流核心）        ║
# ║  192.168.33.x  ap-Global           → 全局代理                        ║
# ║  192.168.34.x  ap-34x              → 住宅IP出口                      ║
# ╠══════════════════════════════════════════════════════════════════════╣
# ║  机场优先级：A（最好） > B（次要） > C（最便宜）                    ║
# ╠══════════════════════════════════════════════════════════════════════╣
# ║  v4 修复内容：                                                       ║
# ║  1. 默认出口/全局代理 改用 ★稳定版（A→B→C），解决HK不通问题       ║
# ║  2. DeepSeek 规则源从 blackmatrix7(404) 换为 MetaCubeX              ║
# ║  3. 补全 IP 规则（Facebook/X/Cloudflare）                           ║
# ║  4. 新增 AI 兜底规则（category-ai-!cn）                             ║
# ║  5. Instagram/Figma/Notion 统一换 MetaCubeX .mrs 格式              ║
# ║  6. 移除 sniffer 弃用字段                                           ║
# ║  7. AirportC 添加备注排查指引                                       ║
# ╠══════════════════════════════════════════════════════════════════════╣
# ║  地区组设计（两套，按用途选择）：                                    ║
# ║  🇸🇬 新加坡   = C→B→A 故障转移（省流量，视频/社交/通用）           ║
# ║  🇸🇬 新加坡★  = A→B→C 故障转移（稳定优先，默认出口/AI平台专用）   ║
# ╠══════════════════════════════════════════════════════════════════════╣
# ║  面板显示顺序（从上到下）：                                          ║
# ║  出口组 → 应用策略组 → 地区组 → 机场子组（基础设施，不常用）        ║
# ╠══════════════════════════════════════════════════════════════════════╣
# ║  必填项搜索 ★ 快速定位                                               ║
# ╚══════════════════════════════════════════════════════════════════════╝

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 一、全局配置
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
mixed-port: 7890
allow-lan: true
bind-address: "*"
ipv6: false
unified-delay: true
tcp-concurrent: true
log-level: warning
global-client-fingerprint: chrome
keep-alive-idle: 600
keep-alive-interval: 15

profile:
  store-selected: true
  store-fake-ip: true

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 二、Web 控制面板
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
external-controller: 0.0.0.0:9090
secret: ""
external-ui: ui
external-ui-name: zashboard
external-ui-url: "https://github.com/Zephyruso/zashboard/archive/refs/heads/gh-pages.zip"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 三、流量嗅探
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"
    - "+.apple.com"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 四、TUN 入站（OpenWrt 透明代理）
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
tun:
  enable: true
  stack: mixed
  dns-hijack:
    - "any:53"
    - "tcp://any:53"
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 五、DNS 配置（防泄漏 + 国内外分流解析）
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
dns:
  enable: true
  cache-algorithm: arc
  listen: 0.0.0.0:1053
  ipv6: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 28.0.0.1/8
  fake-ip-filter-mode: blacklist

  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - system

  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query

  direct-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  direct-nameserver-follow-policy: false

  nameserver:
    - https://8.8.8.8/dns-query#RULES&ecs=223.5.5.0/24
    - https://1.1.1.1/dns-query#RULES

  fake-ip-filter:
    - "rule-set:fakeipfilter"
    - "*.lan"
    - "*.local"
    - "*.localhost"
    - "+.stun.*.*"
    - "+.stun.*.*.*"
    - "time.*.com"
    - "time.*.gov"
    - "ntp.*.com"
    - "localhost.ptlogin2.qq.com"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 六、机场订阅（proxy-providers）
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
proxy-providers:
  # ── 机场A · 最好（稳定主力，AI平台优先使用）─────────────────────
  AirportA:
    type: http
    # 脱敏：请替换为你的机场 A 订阅链接（质量/稳定性优先）
    url: "https://example.com/airport-a/subscribe?token=YOUR_TOKEN_A"
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 120
      timeout: 5000
      lazy: true
    proxy: DIRECT
    exclude-filter: "流量|套餐|到期|剩余|重置|官网|网站|最新网址|防失联|失联|公告|通知|TG|Telegram|群|频道|说明|QQ群|客服|工单|订阅|Expire|Traffic|Reset|Remaining|Official"

  # ── 机场B · 次要（备用）──────────────────────────────────────────
  AirportB:
    type: http
    # 脱敏：请替换为你的机场 B 订阅链接（备用）
    url: "https://example.com/airport-b/subscribe?token=YOUR_TOKEN_B"
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
      timeout: 5000
      lazy: true
    proxy: DIRECT
    exclude-filter: "流量|套餐|到期|剩余|重置|官网|网站|最新网址|防失联|失联|公告|通知|TG|Telegram|群|频道|说明|QQ群|客服|工单|订阅|Expire|Traffic|Reset|Remaining|Official"

  # ── 机场C · 最便宜（视频/流媒体省流量首选）──────────────────────
  # ⚠️ 排查指引：如果面板不显示 AirportC，请检查：
  #   1. 在路由器终端执行 curl -I "订阅URL" 看是否能访问
  #   2. 如果返回超时/拒绝，说明域名被墙，尝试把 proxy: DIRECT 改为 proxy: AirportA（借道A机场拉取）
  #   3. 确认订阅 token 未过期
  #   4. 确认 exclude-filter 没有过滤掉所有节点（临时注释掉 exclude-filter 测试）
  AirportC:
    type: http
    # 脱敏：请替换为你的机场 C 订阅链接（性价比/省流）
    url: "https://example.com/airport-c/subscribe?token=YOUR_TOKEN_C"
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
      timeout: 5000
      lazy: true
    proxy: DIRECT
    exclude-filter: "流量|套餐|到期|剩余|重置|官网|网站|最新网址|防失联|失联|公告|通知|TG|Telegram|群|频道|说明|QQ群|客服|工单|订阅|Expire|Traffic|Reset|Remaining|Official"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 七、静态住宅 IP（proxies）
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
proxies:
  - name: "🏠 美国住宅-34"
    type: socks5
    # 脱敏：请填写你的静态住宅 SOCKS5
    server: "YOUR_RESIDENTIAL_HOST"
    port: 8001
    username: "YOUR_RESIDENTIAL_USER"
    password: "YOUR_RESIDENTIAL_PASS"
    udp: true

  # - name: "🏠 英国住宅-35"
  #   type: socks5
  #   server: "★填写IP地址★"
  #   port: ★填写端口★
  #   username: "★填写用户名★"
  #   password: "★填写密码★"
  #   udp: true

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 八、代理组锚点
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
p_select: &p_select
  type: select

sub_ut_c: &sub_ut_c
  type: url-test
  use: [AirportC]
  url: https://www.gstatic.com/generate_204
  interval: 300
  timeout: 5000
  tolerance: 50

sub_ut_b: &sub_ut_b
  type: url-test
  use: [AirportB]
  url: https://www.gstatic.com/generate_204
  interval: 300
  timeout: 5000
  tolerance: 50

sub_ut_a: &sub_ut_a
  type: url-test
  use: [AirportA]
  url: https://www.gstatic.com/generate_204
  interval: 300
  timeout: 5000
  tolerance: 50

region_eco: &region_eco
  type: fallback
  url: https://www.gstatic.com/generate_204
  interval: 300
  timeout: 5000

region_pro: &region_pro
  type: fallback
  url: https://www.gstatic.com/generate_204
  interval: 300
  timeout: 5000

all_ut: &all_ut
  type: url-test
  include-all-providers: true
  url: https://www.gstatic.com/generate_204
  interval: 300
  timeout: 5000
  tolerance: 20

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 九、代理组（策略组）
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# ┌─────────────────────────────────────────────────────────────┐
# │ 面板显示顺序（最常用的排最前）                               │
# │  第1区：出口组（4个）                                        │
# │  第2区：应用策略组（24个，日常操作区）                       │
# │  第3区：地区组（省流版 + 稳定版，共18个）                    │
# │  第4区：机场子组（基础设施，15个，沉底，几乎不需要手动碰）   │
# └─────────────────────────────────────────────────────────────┘

proxy-groups:
  # ══════════════════════════════════════════════════════════════
  # 【第1区】出口组（4个）
  # ══════════════════════════════════════════════════════════════

  # [v4 修复] 默认出口改用 ★稳定版（A→B→A），最好的机场先上
  # 解决：选香港后部分网站不通的问题
  - name: "🚀 默认出口 32.x"
    type: select
    proxies:
      - "🇭🇰 香港★"
      - "🇯🇵 日本★"
      - "🇸🇬 新加坡★"
      - "🇺🇸 美国★"
      - "🇹🇼 台湾★"
      - "🇬🇧 英国"
      - "🇩🇪 德国"
      - "🇫🇷 法国"
      - "🇰🇷 韩国"
      - "🌐 全部节点"
      - "🔯 故障转移"
      - DIRECT

  # [v4 修复] 全局代理也改用 ★稳定版，确保可靠性
  - name: "🌐 全局代理 33.x"
    type: select
    proxies:
      - "🇭🇰 香港★"
      - "🇯🇵 日本★"
      - "🇸🇬 新加坡★"
      - "🇺🇸 美国★"
      - "🇹🇼 台湾★"
      - "🇬🇧 英国"
      - "🇩🇪 德国"
      - "🇫🇷 法国"
      - "🇰🇷 韩国"
      - "🌐 全部节点"
      - "🔯 故障转移"

  - name: "🏠 住宅IP 34.x"
    type: select
    proxies:
      - "🏠 美国住宅-34"
      # - "🏠 英国住宅-35"

  - name: "🐟 漏网之鱼"
    type: select
    proxies:
      - "🚀 默认出口 32.x"
      - "🔯 故障转移"
      - "🌐 全部节点"
      - DIRECT

  # ══════════════════════════════════════════════════════════════
  # 【第2区】应用策略组（32.x 规则分流，日常操作区）
  #
  #  规则：
  #  · AI 类  → 引用 稳定版地区组（带★）→ A优先 → 断线稳定
  #  · 视频类 → 引用 省流版地区组    → C优先 → 省机场流量
  #  · 其他类 → 引用 省流版地区组    → C优先 → 日常通用
  #  · Steam  → DIRECT 优先，完全不消耗机场流量
  # ══════════════════════════════════════════════════════════════

  # ─────────────────────────────────
  # AI 平台（稳定优先，引用 ★ 版地区）
  # ─────────────────────────────────

  - name: "🤖 Claude 32.x"
    type: select
    proxies:
      - "🇯🇵 日本★"
      - "🇸🇬 新加坡★"
      - "🇺🇸 美国★"
      - "🇹🇼 台湾★"
      - "🇬🇧 英国"
      - "🇩🇪 德国"
      - "🇫🇷 法国"

  - name: "🤖 ChatGPT 32.x"
    type: select
    proxies:
      - "🇯🇵 日本★"
      - "🇸🇬 新加坡★"
      - "🇺🇸 美国★"
      - "🇹🇼 台湾★"
      - "🇬🇧 英国"
      - "🇩🇪 德国"
      - "🇫🇷 法国"

  - name: "🔮 Gemini 32.x"
    type: select
    proxies:
      - "🇭🇰 香港★"
      - "🇯🇵 日本★"
      - "🇸🇬 新加坡★"
      - "🇺🇸 美国★"
      - "🇹🇼 台湾★"

  - name: "🐋 DeepSeek 32.x"
    type: select
    proxies:
      - DIRECT
      - "🇭🇰 香港★"
      - "🇯🇵 日本★"
      - "🇸🇬 新加坡★"
      - "🇺🇸 美国★"
      - "🇹🇼 台湾★"

  # ─────────────────────────────────
  # 视频流媒体（省流优先，引用省流版地区）
  # ─────────────────────────────────

  - name: "📹 YouTube 32.x"
    type: select
    proxies:
      - "🇺🇸 美国"
      - "🇭🇰 香港"
      - "🇯🇵 日本"
      - "🇸🇬 新加坡"
      - "🇹🇼 台湾"

  - name: "🎥 Netflix 32.x"
    type: select
    proxies:
      - "🇸🇬 新加坡"
      - "🇺🇸 美国"
      - "🇭🇰 香港"
      - "🇯🇵 日本"
      - "🇹🇼 台湾"

  - name: "🎵 TikTok 32.x"
    type: select
    proxies:
      - "🇯🇵 日本"
      - "🇺🇸 美国"
      - "🇸🇬 新加坡"
      - "🇹🇼 台湾"
      - "🇰🇷 韩国"

  - name: "🎧 Spotify 32.x"
    type: select
    proxies:
      - "🇺🇸 美国"
      - "🇯🇵 日本"
      - "🇸🇬 新加坡"
      - "🇭🇰 香港"
      - "🇬🇧 英国"

  - name: "🏰 Disney+ 32.x"
    type: select
